name: Phaze CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: nexus_server/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build server
        run: |
          cd nexus_server && go build -o ../phaze-nexus-linux .

      - name: Test suite
        run: |
          cd nexus_server && go test -race -count=1 -v ./...

      - name: Go vet
        run: |
          cd nexus_server && go vet ./...

      - name: Web client (install, build, test, lint)
        run: |
          cd web && npm ci && npm run build && npm run test && npm run lint
