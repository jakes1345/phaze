name: Publish APT repo

# Builds a .deb from the Linux release binary and publishes it to
# docs/apt/ on master. The existing pages.yml deploys docs/ to GitHub
# Pages, so apt.phazechat.world/apt/ becomes the APT repository URL.
#
# Requires GitHub secret: APT_SIGNING_KEY
#   Generate once on any machine:
#     gpg --batch --gen-key <<EOF
#     Key-Type: RSA
#     Key-Length: 4096
#     Name-Real: Phaze Releases
#     Name-Email: support@phazechat.world
#     Expire-Date: 0
#     %no-protection
#     EOF
#     gpg --armor --export-secret-keys support@phazechat.world
#   Paste the output as the APT_SIGNING_KEY secret in GitHub.
#
# DNS: add CNAME record  apt  →  jakes1345.github.io
# GitHub: Settings → Pages → Custom domain → apt.phazechat.world
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to package (e.g. 1.5.1)'
        required: true

permissions:
  contents: write

jobs:
  publish-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version and tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Linux binary from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.ver.outputs.tag }}" \
            --pattern "Phaze-linux-amd64" \
            --dir /tmp/phaze-bin
          chmod +x /tmp/phaze-bin/Phaze-linux-amd64

      - name: Build .deb
        run: |
          chmod +x packaging/debian/build-deb.sh
          packaging/debian/build-deb.sh \
            /tmp/phaze-bin/Phaze-linux-amd64 \
            "${{ steps.ver.outputs.version }}" \
            desktop/assets/icon.png

      - name: Upload .deb to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.ver.outputs.tag }}" \
            packaging/debian/out/phaze_${{ steps.ver.outputs.version }}_amd64.deb \
            --clobber

      - name: Import GPG signing key
        env:
          APT_SIGNING_KEY: ${{ secrets.APT_SIGNING_KEY }}
        run: |
          echo "${APT_SIGNING_KEY}" | gpg --batch --import
          FINGERPRINT=$(gpg --list-keys --with-colons | grep '^fpr' | head -1 | cut -d: -f10)
          echo "GPG_FINGERPRINT=${FINGERPRINT}" >> "$GITHUB_ENV"

      - name: Update APT repo in docs/apt/
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          DEB="packaging/debian/out/phaze_${VERSION}_amd64.deb"
          APT_ROOT="docs/apt"

          mkdir -p "${APT_ROOT}/pool/main/p/phaze"
          mkdir -p "${APT_ROOT}/dists/stable/main/binary-amd64"

          # Copy .deb into pool
          cp "${DEB}" "${APT_ROOT}/pool/main/p/phaze/"

          # Regenerate Packages index
          (cd "${APT_ROOT}" && dpkg-scanpackages --arch amd64 pool/ > dists/stable/main/binary-amd64/Packages)
          gzip -9 -k "${APT_ROOT}/dists/stable/main/binary-amd64/Packages"

          # Generate Release file
          cd "${APT_ROOT}"
          {
            echo "Origin: Phaze"
            echo "Label: Phaze"
            echo "Suite: stable"
            echo "Codename: stable"
            echo "Architectures: amd64"
            echo "Components: main"
            echo "Description: Phaze official APT repository"
            echo "Date: $(date -Ru)"
            echo "MD5Sum:"
            for f in dists/stable/main/binary-amd64/Packages dists/stable/main/binary-amd64/Packages.gz; do
              echo " $(md5sum $f | cut -d' ' -f1) $(wc -c < $f) ${f#dists/stable/}"
            done
            echo "SHA256:"
            for f in dists/stable/main/binary-amd64/Packages dists/stable/main/binary-amd64/Packages.gz; do
              echo " $(sha256sum $f | cut -d' ' -f1) $(wc -c < $f) ${f#dists/stable/}"
            done
          } > dists/stable/Release

          # Sign
          gpg --batch --yes --default-key "${GPG_FINGERPRINT}" \
              --clearsign -o dists/stable/InRelease dists/stable/Release
          gpg --batch --yes --default-key "${GPG_FINGERPRINT}" \
              --detach-sign --armor -o dists/stable/Release.gpg dists/stable/Release

          # Export public key (for users to add)
          gpg --batch --armor --export "${GPG_FINGERPRINT}" > phaze.gpg

          cd ../..

      - name: Commit and push docs/apt/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/apt/
          git commit -m "apt: publish phaze ${{ steps.ver.outputs.version }}" || echo "Nothing to commit"
          git push origin master
