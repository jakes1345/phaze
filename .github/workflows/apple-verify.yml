name: Sovereign Apple Verification

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  verify-macos:
    name: Native macOS Metal Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: native_client/go.sum
      - name: Install Fyne Dependencies
        run: |
          go install fyne.io/fyne/v2/cmd/fyne@latest
      - name: Install VP8 (libvpx) for mediadevices
        run: brew install libvpx pkg-config
      - name: Build Native macOS App
        run: |
          cd native_client
          go build -v -o Phaze.app .

  # fyne-cross iOS requires Docker. GitHub-hosted macOS runners do not expose a
  # working Docker/Podman engine, so real IPA builds are local/release-only.
  # Keep an explicit green job so the workflow graph is fully green in CI.
  verify-ios:
    name: Native iOS (not built in CI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Explain iOS CI scope
        run: |
          set -e
          echo "::notice::iOS/IPA is not built in GitHub Actions (fyne-cross needs Docker)."
          echo "macOS desktop is built in verify-macos. For iOS, use fyne-cross locally or release tooling."
          echo "See README (Android / fyne-cross) and docs/PRE_BETA_CHECKLIST.md."
