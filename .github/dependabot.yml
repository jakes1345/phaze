version: 2
updates:
  - package-ecosystem: gomod
    directory: /nexus_server
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies]

  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: [dependencies]
