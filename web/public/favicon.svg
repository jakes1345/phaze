<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Phaze mark v2 — "Echo"
    Original silhouette that mashes the brand DNA of every messenger:
      • Snapchat ghost  → wavy scalloped bottom edge
      • Discord pillow  → soft rounded squircle body + dot-eye personality
      • Skype echo      → faint reverb ring behind
      • Telegram wing   → single swoosh line across the body
      • xat avatar      → eye catchlights = "alive"
      • Potato vibes    → asymmetric proportions, not a perfect circle
    Solid violet so it stays readable at 16×16. Whitespace cutouts carry the
    personality. Brand color is #863bff.
  -->

  <!-- Echo ring -->
  <circle cx="256" cy="256" r="246" fill="#863bff" opacity="0.14"/>
  <circle cx="256" cy="256" r="218" fill="#863bff" opacity="0.10"/>

  <!-- Body (ghost-potato silhouette) -->
  <path fill="#863bff" d="
    M256 56
    C 372 56  448 130  448 250
    L 448 388
    C 448 412  428 422  410 408
    L 372 380
    C 358 370  340 372  328 384
    L 296 416
    C 280 432  256 432  240 416
    L 208 384
    C 196 372  178 370  164 380
    L 126 408
    C 108 422  88 412  88 388
    L 88 250
    C 88 132  148 56  256 56
    Z
  "/>

  <!-- Telegram-style wing swoosh — subtle motion across the body -->
  <path fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round" opacity="0.22" d="
    M 120 256
    Q 220 218  302 232
    Q 380 244  410 218
  "/>

  <!-- Eyes (white) — slight asymmetry for personality -->
  <ellipse cx="208" cy="222" rx="28" ry="34" fill="#ffffff"/>
  <ellipse cx="320" cy="222" rx="24" ry="30" fill="#ffffff"/>

  <!-- Pupils -->
  <circle cx="218" cy="210" r="9" fill="#1a0f2e"/>
  <circle cx="328" cy="210" r="8" fill="#1a0f2e"/>

  <!-- Catchlights (tiny white spark in the pupil = alive) -->
  <circle cx="221" cy="206" r="3" fill="#ffffff"/>
  <circle cx="331" cy="206" r="2.5" fill="#ffffff"/>

  <!-- Phase / sound-wave signature below the eyes (rising "Phaze" wave) -->
  <rect x="212" y="310" width="14" height="7" rx="3.5" fill="#ffffff" opacity="0.65"/>
  <rect x="232" y="302" width="14" height="7" rx="3.5" fill="#ffffff" opacity="0.85"/>
  <rect x="252" y="294" width="14" height="7" rx="3.5" fill="#ffffff"/>
  <rect x="272" y="302" width="14" height="7" rx="3.5" fill="#ffffff" opacity="0.85"/>
  <rect x="292" y="310" width="14" height="7" rx="3.5" fill="#ffffff" opacity="0.65"/>
</svg>
